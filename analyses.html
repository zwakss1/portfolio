  <script>

    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('scrollPos_' + window.location.href, window.scrollY);
    });

    // Filet de sécurité : si pour une raison X la page reste masquée (ex: fetch qui échoue),
    // on la révèle quand même après 2s pour ne jamais bloquer l'affichage.
    if (document.documentElement.style.visibility === 'hidden') {
        setTimeout(() => { document.documentElement.style.visibility = 'visible'; }, 2000);
    }

    // Ce système générique ne gère que la restauration du scroll pour la VUE LISTE.
    // La vue article gère sa propre restauration directement dans afficherArticle()
    // (voir plus bas) pour éviter tout flash "retour en haut".
    if (!location.hash.startsWith('#article=')) {
        const scrollObserver = new MutationObserver(() => {
            const savedScroll = sessionStorage.getItem('scrollPos_' + window.location.href);
            if (savedScroll !== null) {
                setTimeout(() => {
                    window.scrollTo({ top: parseInt(savedScroll, 10), behavior: 'instant' });
                    scrollObserver.disconnect();
                    sessionStorage.removeItem('scrollPos_' + window.location.href);
                }, 100); // 100ms pour laisser le temps à toutes les cartes de charger
            }
        });
        scrollObserver.observe(document.body, { childList: true, subtree: true });
    }

    /* ================================================================
       LISTE DES FICHIERS .md
       ================================================================ */
    const FICHIERS_MD = [
      "analyse-critique/sonic-with-me.md",
      "analyse-critique/Pokemon-USUL.md",
    ];


    /* ── Icônes SVG ── */
    const ICONE_JV    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
    const ICONE_MU    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;
    const ICONE_CAL   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
    const ICONE_CLOCK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    const ICONE_STAR  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;


    /* ================================================================
       AVERTISSEMENTS — bandeaux réutilisables en tête d'article
       ================================================================
       Pour en afficher un ou plusieurs sur une analyse, ajoute dans le
       frontmatter du .md une ligne :

         avertissements: spoiler, subjectivite

       (liste séparée par des virgules, parmi les clés ci-dessous)
       ================================================================ */
    const AVERTISSEMENTS = {
      paroles: {
        titre: "Précision",
        classe: "",
        texte: `cette analyse ne porte pas sur la composition musicale (instrumentation, production, etc.), mais sur une <strong>interprétation des paroles</strong> mises en lien avec le jeu et le moment où ce morceau intervient.`
      },
      spoiler: {
        titre: "Spoilers",
        classe: "warning-spoiler",
        texte: `cette analyse aborde en détail des éléments d'intrigue et de déroulement du jeu. Si tu n'as pas terminé le jeu concerné, certains passages peuvent te spoiler.`
      },
      subjectivite: {
        titre: "Précision méthodologique",
        classe: "",
        texte: `cette critique assume une <strong>subjectivité déclarée</strong> : elle repose sur mon analyse et mon ressenti personnels, pas sur une prétention à l'objectivité ou à une vérité universelle sur le jeu, mon but est de chercher une certaine impartialité et être proportionnel tout en prenant les choses dans leur contexte quelque soit le jeu.`
      },
      shaders: {
        titre: "Note technique",
        classe: "",
        texte: `Les séquences vidéo ont été capturées sur émulateur. Quelques légères micro-saccades d'une fraction de seconde peuvent apparaître lors du chargement des <strong>shaders</strong> en direct ; ce ne sont pas des bugs du jeu original, mais bien de mon émulateur qui les charge pour la première fois.`
      }
    };

    function genererAvertissements(meta, cat) {
      let liste = (meta.avertissements || "").split(",").map(s => s.trim()).filter(Boolean);

      // Rétrocompatibilité : les analyses musicales sans champ explicite
      // gardent l'avertissement "paroles" par défaut.
      if (liste.length === 0 && cat === "mu") liste = ["paroles"];

      return liste.map(id => {
        const av = AVERTISSEMENTS[id];
        if (!av) { console.warn("Type d'avertissement inconnu :", id); return ""; }
        return `
          <div class="article-warning ${av.classe}">
            <span class="article-warning-icone">⚠️</span>
            <div class="article-warning-texte">
              <strong>${av.titre} :</strong> ${av.texte}
            </div>
          </div>`;
      }).join("");
    }


    /* ================================================================
       CRITÈRES NOTÉS PAR ASPECT (barres colorées, rouge → bleu)
       ================================================================
       Pour en afficher sur une analyse, ajoute dans le frontmatter du .md
       une ligne, avec autant de critères que pertinent pour ce jeu :

         criteres: Gameplay:70, Scénario:55, Exploration:80, DA:90

       (nom:valeur de 0 à 100, séparés par des virgules — libre à toi de
       choisir des critères différents selon le jeu analysé)
       ================================================================ */
    const DEGRADE_CRITERES = ["#ff1a1a", "#e02020", "#ff8c1a", "#ffd60a", "#8ce68c", "#34c759", "#1f7a3d", "#0a84ff"];

    function hexVersRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function couleurCritere(valeur) {
      const nbSegments = DEGRADE_CRITERES.length - 1;
      const position = (valeur / 100) * nbSegments;
      const index = Math.min(Math.floor(position), nbSegments - 1);
      const t = position - index;
      const c1 = hexVersRgb(DEGRADE_CRITERES[index]);
      const c2 = hexVersRgb(DEGRADE_CRITERES[index + 1]);
      const r = Math.round(c1.r + (c2.r - c1.r) * t);
      const g = Math.round(c1.g + (c2.g - c1.g) * t);
      const b = Math.round(c1.b + (c2.b - c1.b) * t);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function genererCriteres(meta) {
      const paires = (meta.criteres || "").split(",").map(s => s.trim()).filter(Boolean);
      if (paires.length === 0) return "";

      const lignes = paires.map(p => {
        const [nom, valBrute] = p.split(":").map(s => s.trim());
        const valeur = Math.max(0, Math.min(100, parseInt(valBrute) || 0));
        if (!nom) return "";
        return `
          <div class="critere-ligne">
            <div class="critere-label">${nom}</div>
            <div class="critere-barre-fond">
              <div class="critere-barre-remplie" style="width:${valeur}%; background:${couleurCritere(valeur)};"></div>
            </div>
            <div class="critere-valeur">${valeur}%</div>
          </div>`;
      }).join("");

      return `<div class="criteres-titre">Critères</div>${lignes}`;
    }


    /* ================================================================
       PARSING FRONTMATTER
       ================================================================ */
    function parseFrontmatter(texte) {
      const meta = { titre:"Sans titre", categorie:"jv", genre:"", note:null, date:"", lecture:"", statut:"publié", description:"", avertissements:"", criteres:"" };

      const match = texte.match(/^---\r?\n([\s\S]*?)\r?\n---/);
      if (!match) return { meta, contenu: texte };

      const contenu = texte.slice(match[0].length).trim();
      match[1].split(/\r?\n/).forEach(ligne => {
        const sep = ligne.indexOf(":");
        if (sep === -1) return;
        const cle = ligne.slice(0, sep).trim();
        const val = ligne.slice(sep + 1).trim();
        if (cle) meta[cle] = val;
      });

      // Description = 1er paragraphe après le H1
      const lignes = contenu.split(/\r?\n/);
      let apresH1 = false;
      for (const l of lignes) {
        if (l.startsWith("# ")) { apresH1 = true; continue; }
        if (apresH1 && l.trim() && !l.startsWith("#")) { meta.description = l.trim(); break; }
      }
      if (!meta.description) {
        for (const l of lignes) {
          if (l.trim() && !l.startsWith("#")) { meta.description = l.trim(); break; }
        }
      }
      return { meta, contenu };
    }


    /* ================================================================
       GÉNÉRATION CARD
       ================================================================ */
    function genererCard(meta, fichier) {
      const cat      = meta.categorie === "mu" ? "mu" : "jv";
      const icone    = cat === "mu" ? ICONE_MU : ICONE_JV;
      const tagClass = cat === "mu" ? "tag-mu" : "tag-jv";
      const tagLabel = cat === "mu" ? "🎵 Musique" : "🎮 Jeux vidéo";
      const dotClass = cat === "mu" ? "dot-mu" : "dot-jv";
      const enCours  = meta.statut === "en-cours";

      const badgeWip    = enCours ? `<span class="badge-wip">En cours</span>` : "";
      const metaDate    = meta.date ? `<span class="card-meta-item">${ICONE_CAL} ${meta.date}</span>` : "";
      const metaLecture = meta.lecture && !enCours
        ? `<span class="card-meta-item">${ICONE_CLOCK} ${meta.lecture} de lecture</span>`
        : enCours ? `<span class="card-meta-item">${ICONE_CLOCK} À venir</span>` : "";
      const metaGenre   = meta.genre ? `<span class="card-meta-item"><span class="dot-lang ${dotClass}"></span> ${meta.genre}</span>` : "";

      const sousTitreJeu = meta.jeu
        ? `<span class="card-jeu">— ${meta.jeu}</span>` : "";

      const banniereStyle = meta.banniere
        ? `style="--banniere: url('${meta.banniere}')"` : "";
      const banniereClass = meta.banniere ? " card-avec-banniere" : "";

      return `
      <a href="#" class="card-analyse${banniereClass}" data-cat="${cat}" data-fichier="${fichier}" ${banniereStyle}>
        <div class="card-titre">${icone} ${meta.titre} ${badgeWip}</div>
        ${sousTitreJeu}
        <div class="card-desc">${meta.description}</div>
        <div class="card-meta">${metaGenre} ${metaDate} ${metaLecture}</div>
      </a>`;
    }


    /* ================================================================
       SCREENSHOTS & VIDÉOS — média statique à droite du paragraphe concerné
       ================================================================
       Syntaxes à utiliser dans les .md :

         [[screenshot: img/analyse-critique/mon-image.png]]
         [[screenshot: img/analyse-critique/image1.png, img/analyse-critique/image2.png]]
         [[video: img/analyse-critique/mon-clip.mp4]]
         [[youtube: dQw4w9WgXcQ]]

         Le paragraphe qui suit le marqueur (séparé par une ligne
         vide, comme n'importe quel paragraphe Markdown) sera affiché
         à côté du média, à l'endroit précis où il se trouve dans le
         texte. Le média ne bouge pas au scroll, il reste simplement
         là où le paragraphe se trouve. Les autres paragraphes de
         l'article ne sont pas affectés.

         - screenshot : image statique
         - video      : fichier vidéo local (mp4, webm…), lecteur natif
         - youtube    : identifiant de la vidéo YouTube (la partie
                        après "v=" dans l'URL, ou après youtu.be/)
       ================================================================ */
    /* ================================================================
       LIGHTBOX — zoom plein écran au clic sur une image d'analyse
       ================================================================ */
    let lightboxOverlay = null;

    function ouvrirLightbox(src) {
      if (lightboxOverlay) fermerLightbox();

      lightboxOverlay = document.createElement("div");
      lightboxOverlay.className = "lightbox-overlay";

      const img = document.createElement("img");
      img.src = src;
      img.className = "lightbox-img";
      img.alt = "Capture d'écran en plein écran";
      // Empêche le clic sur l'image elle-même de fermer la lightbox
      // via le clic sur l'overlay (voir plus bas).
      img.addEventListener("click", (e) => e.stopPropagation());

      lightboxOverlay.appendChild(img);
      lightboxOverlay.addEventListener("click", fermerLightbox);
      document.addEventListener("keydown", fermerLightboxEchap);

      document.body.appendChild(lightboxOverlay);
      document.body.style.overflow = "hidden"; // empêche le scroll de la page en arrière-plan

      // Forcer un reflow avant d'ajouter la classe, pour que la transition CSS s'applique
      requestAnimationFrame(() => lightboxOverlay.classList.add("visible"));
    }

    function fermerLightbox() {
      if (!lightboxOverlay) return;
      lightboxOverlay.classList.remove("visible");
      document.removeEventListener("keydown", fermerLightboxEchap);
      document.body.style.overflow = "";
      const overlayÀSupprimer = lightboxOverlay;
      lightboxOverlay = null;
      setTimeout(() => overlayÀSupprimer.remove(), 200); // laisse la transition de fermeture se jouer
    }

    function fermerLightboxEchap(e) {
      if (e.key === "Escape") fermerLightbox();
    }

    function activerScrollytelling(conteneur) {
      const REGEX_MARQUEUR = /^\[\[(screenshot|video|youtube):\s*(.+?)\]\]$/;

      Array.from(conteneur.querySelectorAll("p")).forEach(p => {
        const m = p.textContent.trim().match(REGEX_MARQUEUR);
        if (!m) return;
        const type   = m[1];
        const valeur = m[2].trim();
        const cible  = p.nextElementSibling;
        p.remove();
        if (!cible) return;

        // On enveloppe uniquement CE paragraphe avec son média, en conservant
        // sa position exacte dans le flux — le reste de l'article n'est pas touché.
        const bloc = document.createElement("div");
        bloc.className = (type === "screenshot") ? "screenshot-bloc" : "video-bloc";
        cible.parentNode.insertBefore(bloc, cible);
        bloc.appendChild(cible);

        if (type === "screenshot") {
          // Plusieurs images séparées par des virgules : [[screenshot: a.png, b.png]]
          // Toutes regroupées dans un conteneur "stack" pour être empilées
          // proprement (et non superposées au même endroit).
          const stack = document.createElement("div");
          stack.className = "screenshot-stack";
          valeur.split(",").map(s => s.trim()).filter(Boolean).forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.alt = "Capture d'écran de l'analyse";
            img.className = "screenshot-img";
            img.loading = "lazy";
            img.addEventListener("click", () => ouvrirLightbox(src));
            stack.appendChild(img);
          });
          bloc.appendChild(stack);

        } else if (type === "video") {
          const video = document.createElement("video");
          video.src = valeur;
          video.controls = true;
          video.preload = "metadata";
          video.className = "video-media";
          bloc.appendChild(video);

        } else if (type === "youtube") {
          const wrap = document.createElement("div");
          wrap.className = "video-embed-wrap";
          const iframe = document.createElement("iframe");
          iframe.src = `https://www.youtube-nocookie.com/embed/${valeur}`;
          iframe.title = "Vidéo YouTube";
          iframe.loading = "lazy";
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
          iframe.allowFullscreen = true;
          wrap.appendChild(iframe);
          bloc.appendChild(wrap);
        }
      });
    }


    /* ================================================================
       VUE ARTICLE — affichage d'une analyse
       ================================================================ */
    function afficherArticle(meta, contenu, fichier, majHash = true) {
      const cat      = meta.categorie === "mu" ? "mu" : "jv";
      const tagClass = cat === "mu" ? "tag-mu" : "tag-jv";
      const tagLabel = cat === "mu" ? "🎵 Musique" : "🎮 Jeux vidéo";
      const enCours  = meta.statut === "en-cours";

      // Breadcrumb
      document.getElementById("breadcrumb-titre").textContent = meta.titre;

      // Meta top (badge catégorie)
      document.getElementById("article-meta-top").innerHTML = `
        <span class="tag ${tagClass}">${tagLabel}</span>
        ${enCours ? `<span class="badge-wip">En cours</span>` : ""}
      `;

      // Titre + sous-titre jeu
      document.getElementById("article-titre").textContent = meta.titre;
      const sousTitreEl = document.getElementById("article-sous-titre");
      if (meta.jeu) {
        sousTitreEl.textContent = meta.jeu;
        sousTitreEl.style.display = "";
      } else {
        sousTitreEl.style.display = "none";
      }

      // Infos (note, genre, date, lecture)
      const noteHtml = (meta.note && !enCours)
        ? `<span class="article-info-item note-inline">${ICONE_STAR} ${meta.note}<span style="font-weight:400;opacity:.6">/10</span></span>`
        : "";
      const genreHtml = meta.genre
        ? `<span class="article-info-item">${meta.genre}</span>` : "";
      const dateHtml = meta.date
        ? `<span class="article-info-item">${ICONE_CAL} ${meta.date}</span>` : "";
      const lectureHtml = (meta.lecture && !enCours)
        ? `<span class="article-info-item">${ICONE_CLOCK} ${meta.lecture} de lecture</span>` : "";

      document.getElementById("article-infos").innerHTML =
        [noteHtml, genreHtml, dateHtml, lectureHtml].filter(Boolean).join('<span class="sep">·</span>');

      // Avertissements (spoiler, méthodologie, paroles...) selon le frontmatter
      document.getElementById("article-warnings").innerHTML = genererAvertissements(meta, cat);

      // Critères notés par aspect (gameplay, scénario...) selon le frontmatter
      const critHtml = genererCriteres(meta);
      const critBox = document.getElementById("article-criteres");
      critBox.innerHTML = critHtml;
      critBox.style.display = critHtml ? "" : "none";

// 1. Préparation du contenu
const contenuSansH1 = contenu.replace(/^#\s+.+$/m, "").trim();
let htmlFinal = marked.parse(contenuSansH1);

// 2. Injection du lecteur (si audio présent)
if (meta.audio) {
  htmlFinal = `
    <audio id="lecteur-audio" controls class="lecteur-audio-sticky">
      <source src="${meta.audio}" type="audio/mpeg">
    </audio>
  ` + htmlFinal;
}

document.getElementById("article-corps").innerHTML = htmlFinal;

// 2bis. Activation du scrollytelling (screenshots qui suivent les paragraphes marqués)
activerScrollytelling(document.getElementById("article-corps"));

// 3. Configuration du lecteur (Volume + Restauration de la position)
if (meta.audio) {
  const lecteur = document.getElementById("lecteur-audio");
  
  // Réglage du volume par défaut
  lecteur.volume = 0.2;

  // Restauration de la position si elle existe
  const posSauvegardee = sessionStorage.getItem('audioPos_' + window.location.href);
  if (posSauvegardee) {
      lecteur.currentTime = parseFloat(posSauvegardee);
  }
}

// 4. Sauvegarde de la position avant de quitter ou rafraîchir
window.addEventListener('beforeunload', () => {
    const lecteur = document.getElementById("lecteur-audio");
    if (lecteur) {
        sessionStorage.setItem('audioPos_' + window.location.href, lecteur.currentTime);
    }
});


      // Basculer les vues
      document.getElementById("vue-liste").style.display  = "none";
      document.getElementById("vue-article").style.display = "";

      if (majHash) {
        // Nouvelle navigation (clic sur une carte) : on part du haut, avec animation
        window.scrollTo({ top: 0, behavior: "smooth" });
        const hashCible = "#article=" + encodeURIComponent(fichier);
        if (window.location.hash !== hashCible) {
          history.pushState(null, "", hashCible);
        }
      } else {
        // Restauration (F5 / lien direct) : on saute directement à la position
        // sauvegardée, sans passer par le haut, pour éviter tout flash.
        const cleScroll = 'scrollPos_' + window.location.href;
        const savedScroll = sessionStorage.getItem(cleScroll);
        window.scrollTo({ top: savedScroll !== null ? parseInt(savedScroll, 10) : 0, behavior: "instant" });
        if (savedScroll !== null) sessionStorage.removeItem(cleScroll);
      }

      // On révèle la page (masquée depuis le <head> le temps de se positionner correctement)
      document.documentElement.style.visibility = "visible";
    }


    /* ================================================================
       CHARGEMENT PRINCIPAL
       ================================================================ */
    const cache = {}; // mémorise les fichiers déjà chargés

    async function chargerAnalyses() {
      const grille   = document.getElementById("grille");
      const etatVide = document.getElementById("etat-vide");

      const resultats = await Promise.allSettled(
        FICHIERS_MD.map(f =>
          fetch(f).then(r => {
            if (!r.ok) throw new Error(f);
            return r.text().then(t => ({ texte: t, fichier: f }));
          })
        )
      );

      grille.innerHTML = "";
      const cards = [];

      resultats.forEach(res => {
        if (res.status === "rejected") { console.warn("Introuvable :", res.reason.message); return; }
        const { texte, fichier } = res.value;
        const { meta, contenu } = parseFrontmatter(texte);
        cache[fichier] = { meta, contenu };
        cards.push({ meta, fichier });
        grille.insertAdjacentHTML("beforeend", genererCard(meta, fichier));
      });

      if (cards.length === 0) { etatVide.style.display = "block"; return; }

      const allCards = Array.from(document.querySelectorAll(".card-analyse"));

      // Compteurs / barre de stats
      const nbJv = cards.filter(c => (c.meta.categorie || "jv") === "jv").length;
      const nbMu = cards.filter(c => c.meta.categorie === "mu").length;
      document.getElementById("compteur").textContent  = cards.length;
      document.getElementById("badge-tous").textContent = cards.length;
      document.getElementById("badge-jv").textContent   = nbJv;
      document.getElementById("badge-mu").textContent   = nbMu;
      document.getElementById("stat-jv").textContent    = nbJv;
      document.getElementById("stat-mu").textContent    = nbMu;
      const dates = cards.map(c => c.meta.date).filter(Boolean).sort();
      if (dates.length) document.getElementById("stat-date").textContent = dates[dates.length - 1];

      // Ouverture d'une analyse au clic sur une carte
      grille.addEventListener("click", e => {
        const card = e.target.closest(".card-analyse");
        if (!card) return;
        e.preventDefault();
        const fichier = card.dataset.fichier;
        const { meta, contenu } = cache[fichier];
        afficherArticle(meta, contenu, fichier);
      });

      // Filtres
      document.querySelectorAll(".filtre-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filtre-btn").forEach(b => b.classList.remove("actif"));
          btn.classList.add("actif");
          const cat = btn.dataset.cat;
          let visible = 0;
          allCards.forEach(card => {
            const show = cat === "tous" || card.dataset.cat === cat;
            card.style.display = show ? "" : "none";
            if (show) visible++;
          });
          etatVide.style.display = visible === 0 ? "block" : "none";
          document.getElementById("compteur").textContent = visible;
        });
      });

      // Filtre depuis sidebar
      document.querySelectorAll("[data-filtre]").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          retourListe();
          document.querySelector(`.filtre-btn[data-cat="${link.dataset.filtre}"]`).click();
        });
      });

      // Restaurer la vue depuis l'URL (rafraîchissement / lien direct)
      ouvrirDepuisHash();
    }


    /* ── Ouvre l'article correspondant au hash de l'URL ── */
    async function ouvrirDepuisHash() {
      const hash = window.location.hash;
      const prefixe = "#article=";

      if (!hash.startsWith(prefixe)) {
        retourListe(false);
        return;
      }

      const fichier = decodeURIComponent(hash.slice(prefixe.length));

      if (!cache[fichier]) {
        try {
          const r = await fetch(fichier);
          if (!r.ok) throw new Error(fichier);
          const t = await r.text();
          cache[fichier] = parseFrontmatter(t);
        } catch (e) {
          console.warn("Article introuvable pour le hash :", fichier);
          retourListe(false);
          return;
        }
      }

      const { meta, contenu } = cache[fichier];
      afficherArticle(meta, contenu, fichier, false);
    }


    /* ── Retour vers la liste ── */
    function retourListe(majHash = true) {
      document.getElementById("vue-article").style.display = "none";
      document.getElementById("vue-liste").style.display   = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
      document.documentElement.style.visibility = "visible";

      if (majHash && window.location.hash) {
        history.pushState(null, "", window.location.pathname + window.location.search);
      }
    }

    document.getElementById("btn-retour").addEventListener("click", () => retourListe());

    // Navigation arrière/avant du navigateur
    window.addEventListener("popstate", () => {
      ouvrirDepuisHash();
    });


    /* ── Thème ── */
    const btnTheme = document.getElementById("bouton-theme");
    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("theme-light");
      btnTheme.textContent = "🌙";
    }
    btnTheme.addEventListener("click", () => {
      document.body.classList.toggle("theme-light");
      const clair = document.body.classList.contains("theme-light");
      btnTheme.textContent = clair ? "🌙" : "☀️";
      localStorage.setItem("theme", clair ? "light" : "dark");
    });

    chargerAnalyses();

  </script>
