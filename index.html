<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    /* Applique le thème AVANT le premier affichage pour éviter le flash sombre→clair */
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('theme-light');
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>

<body>

  <header class="bande-haut">
  <nav>
    <ul class="conteneur-boutons">

      <!-- Bouton Accueil -->
      <li class="parent-menu">
        <a href="index.html" class="bouton-bande">
          <img src="img/house.png" class="icone-menu icone-blanche" alt="Accueil">
        </a>
      </li>

      <!-- Bouton Projets (affiche l'info-bulle "Projets" au survol) -->
      <li class="parent-menu">
        <a href="Projet.html" class="bouton-bande">
          <img src="img/folder-dot.png" class="icone-menu icone-blanche" alt="Projets">
        </a>
        <ul class="sous-menu">
          <li class="titre-sous-menu">Projets</li>
        </ul>
      </li>

      <!-- Bouton Analyses (affiche l'info-bulle "Analyse & critique" au survol) -->
      <li class="parent-menu">
        <a href="analyses.html" class="bouton-bande">
          <img src="img/logoanalyse.png" class="icone-menu icone-blanche" alt="Analyses">
        </a>
        <ul class="sous-menu">
          <li class="titre-sous-menu">Analyse &amp; critique</li>
        </ul>
      </li>

    </ul>
  </nav>
  
  <button id="bouton-theme" class="bouton-theme" aria-label="Changer de thème">☀️</button>
</header>

<main id="content" class="feuille-texte"></main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    /* ================================================================
       SAUVEGARDE ET RESTAURATION DU SCROLL (Anti-bug de hauteur)
       ================================================================ */
    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('scrollPos_' + window.location.href, window.scrollY);
    });

    const scrollObserver = new MutationObserver(() => {
        const savedScroll = sessionStorage.getItem('scrollPos_' + window.location.href);
        if (savedScroll !== null) {
            // On laisse 50ms au navigateur pour calculer la hauteur réelle du Markdown injecté
            setTimeout(() => {
                window.scrollTo({ top: parseInt(savedScroll, 10), behavior: 'instant' });
                scrollObserver.disconnect();
                sessionStorage.removeItem('scrollPos_' + window.location.href);
            }, 50);
        }
    });
    scrollObserver.observe(document.body, { childList: true, subtree: true });

    /* ================================================================
       CHARGEMENT DE TON ACCUEIL MARKDOWN
       ================================================================ */
    fetch('accueil.md')
      .then(response => {
        if (!response.ok) throw new Error("Document introuvable");
        return response.text();
      })
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(error => console.error('Erreur lors du chargement du Markdown :', error));

    /* ── Gestionnaire de Thème ── */
    const btnTheme = document.getElementById('bouton-theme');
    const racine = document.documentElement;

    if (racine.classList.contains('theme-light')) {
      btnTheme.textContent = '🌙';
    }

    btnTheme.addEventListener('click', () => {
      racine.classList.toggle('theme-light');
      if (racine.classList.contains('theme-light')) {
        btnTheme.textContent = '🌙'; 
        localStorage.setItem('theme', 'light'); 
      } else {
        btnTheme.textContent = '☀️'; 
        localStorage.setItem('theme', 'dark'); 
      }
    });
  </script>

  <script data-goatcounter="https://zwakss1.goatcounter.com/count"
          async src="//gc.zgo.at/count.js">
  </script>
</body>
</html>
