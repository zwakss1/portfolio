<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="bande-haut">
    <nav>
      <ul class="conteneur-boutons">

        <li class="parent-menu">
          <a href="Accueil.html" class="bouton-bande">
            <img src="img/house.png" class="icone-menu icone-blanche" alt="Accueil">
          </a>
        </li>

        <li class="parent-menu">
          <a href="Projet.html" class="bouton-bande">
            <img src="img/folder-dot.png" class="icone-menu icone-blanche" alt="Projets">
          </a>

          <ul class="sous-menu">
            <li>
              <a href="#">
                <img src="img/chargement.png" class="icone-menu" alt="En cours"> En cours
              </a>
            </li>
            <li>
              <a href="#">
                <img src="img/fini.png" class="icone-menu" alt="Terminé"> Terminé
              </a>
            </li>
          </ul>
        </li>

        <li class="parent-menu">
          <a href="Analyses&critique.html" class="bouton-bande">
            <img src="img/logoanalyse.png" class="icone-menu icone-blanche" alt="Analyses">
          </a>

          <ul class="sous-menu">
            <li>
              <a href="#">
                <img src="img/gamepad-2.png" class="icone-menu icone-blanche" alt="Jeux vidéo"> Jeux vidéo
              </a>
            </li>
            <li>
              <a href="#">
                <img src="img/music-2.png" class="icone-menu icone-blanche" alt="Musique"> Musique
              </a>
            </li>
          </ul>
        </li>

      </ul>
    </nav>
  </header>

  <main id="content" class="feuille-texte"></main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('accueil.md')
      .then(response => {
        if (!response.ok) throw new Error("Document introuvable");
        return response.text();
      })
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(error => console.error('Erreur lors du chargement du Markdown :', error));
  </script>

</body>
</html>
